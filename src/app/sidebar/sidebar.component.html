<aside class="main-sidebar sidebar-dark-primary elevation-4 fg-sidebar">
  <!-- Brand Logo -->
  <a routerLink="/" class="brand-link fg-brand-link">
    <div class="brand-logo-wrap">
      <img
        src="dist/img/product2.png"
        alt="Finish Goods Logo"
        class="brand-image fg-brand-image"
      />
    </div>

    <span class="brand-text fg-brand-text">
      <span class="brand-small">FG PALLET</span>
      <span class="brand-title">Finish Goods</span>
    </span>
  </a>

  <!-- Sidebar -->
  <div class="sidebar fg-sidebar-body">
    <!-- User Panel -->
    @if (name != undefined) {
      <div class="user-panel fg-user-panel">
        <div class="fg-user-card">
          <div class="image fg-user-avatar">
            <img
              src="dist/img/employee.png"
              class="img-circle"
              alt="User Image"
            />
          </div>

          <div class="info fg-user-info">
            <h5>{{ empNo || 'Operator' }}</h5>
            <small>{{ level || 'Finish Goods User' }}</small>
          </div>
        </div>

        <button class="btn fg-signout-btn w-100" (click)="signout()">
          <i class="fas fa-sign-out-alt me-2"></i>
          Sign Out
        </button>
      </div>
    }

    <!-- Menu -->
    <nav class="mt-2">
      <ul
        class="nav nav-pills nav-sidebar flex-column fg-nav"
        data-widget="treeview"
        role="menu"
        style="padding-bottom: 60px"
      >
        <!-- Main Menu -->
        <li class="nav-item mb-1">
          <a routerLink="/" class="nav-link" routerLinkActive="active">
            <i class="nav-icon fas fa-home"></i>
            <p class="ms-2">หน้าหลัก</p>
          </a>
        </li>

        <!-- Issue Pallet -->
        <li class="nav-item mb-1">
          <a routerLink="/issue" class="nav-link" routerLinkActive="active">
            <i class="nav-icon fas fa-qrcode"></i>
            <p class="ms-2">Issue Pallet</p>
          </a>
        </li>

        <!-- Data Master -->
        <li class="nav-item">
          <h6 class="sidebar-heading fg-sidebar-heading">
            <span>Data Master</span>
          </h6>

          <a href="#" class="nav-link">
            <i class="nav-icon fas fa-database"></i>
            <p class="ms-2">
              Master
              <i class="fas fa-angle-right ms-auto"></i>
            </p>
          </a>

          <ul class="nav nav-treeview fg-treeview">
            <li class="nav-item">
              <a
                routerLink="/project"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="fas fa-boxes-stacked nav-icon"></i>
                <p class="ms-2">Add Project</p>
              </a>
            </li>

            <li class="nav-item">
              <a
                routerLink="/machine-output"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="fas fa-layer-group nav-icon"></i>
                <p class="ms-2">Add Impact</p>
              </a>
            </li>
          </ul>
        </li>

        <!-- Report Views -->
        <li class="nav-item">
          <h6 class="sidebar-heading fg-sidebar-heading">
            <span>Report Views</span>
          </h6>

          <a href="#" class="nav-link">
            <i class="nav-icon fas fa-chart-pie"></i>
            <p class="ms-2">
              Reports
              <i class="fas fa-angle-right ms-auto"></i>
            </p>
          </a>

          <ul class="nav nav-treeview fg-treeview">
            <li class="nav-item mb-1">
              <a
                routerLink="/dashboard"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="nav-icon fas fa-chart-line"></i>
                <p class="ms-2">Dashboard</p>
              </a>
            </li>

            <li class="nav-item mb-1">
              <a
                routerLink="/scrap-report"
                class="nav-link"
                routerLinkActive="active"
              >
                <i class="nav-icon fas fa-file-lines"></i>
                <p class="ms-2">FG Report</p>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </div>
</aside>
